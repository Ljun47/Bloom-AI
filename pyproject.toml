[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
markers = [
    "unit: 단위 테스트 (외부 의존성 없음)",
    "integration: 통합 테스트 (에이전트 간 연동)",
    "live: 실제 LLM/Backend API 호출 (느림, -m live로 명시 실행)",
    "slow: 5초 이상 소요되는 테스트",
]
addopts = "-m 'not live'"

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = "dev/"

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["dev/*"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["dev/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["yaml", "yaml.*", "pymysql", "pymysql.*"]
ignore_missing_imports = true
