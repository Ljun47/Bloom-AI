            "branches": [
              {"structure": "reflection", "pros": ["장점1"], "cons": ["단점1"], "predicted_impact": "효과"},
              {"structure": "discovery", "pros": ["장점1"], "cons": ["단점1"], "predicted_impact": "효과"},
