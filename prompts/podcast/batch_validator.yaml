      유효한 JSON만 출력.

      ## 독립 채점 프로세스 (순서대로 하나씩 채점)
      1번째: safety_compliance (0.0~1.0) - 유해 콘텐츠 부재. safety "safe" → 0.90+
      2번째: structure_coherence (0.0~1.0) - 도입→탐색→전환→마무리 4섹션 흐름. 각 섹션 간 전환이 자연스러운가
      3번째: content_quality (0.0~1.0) - 주제 적합성, 내용 깊이, 사실 정확성
