services:
  ai-server:
    build: .
    image: ${AI_SERVER_IMAGE:-mindlog-ai-service:latest}
    container_name: mindlog-ai-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # [B-1 전략] 서버의 prompts 폴더를 컨테이너 내부와 실시간 연결
      - ./prompts:/app/prompts
      # 로그 기록 보존을 위해 서버 폴더와 연결
      - ./logs:/app/logs
    # EC2 t3.medium(4GB) — Neo4j 공존을 위해 1.5GB로 축소
    # [이관 주석] Neo4j를 Backend(app-3)로 이관 시 2000m으로 복원
    mem_limit: 1500m
    memswap_limit: 1500m
    cpus: '1.5'
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      # [B-2] ALB 헬스체크용 엔드포인트 확인 (30초 간격)
      # python:3.11-slim 이미지에 curl이 미설치이므로 python urllib 사용
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  # [이관 주석] Neo4j를 Backend(app-3)로 이관 시:
  # 1. 아래 neo4j 서비스 블록 전체 삭제
  # 2. ai-server의 depends_on.neo4j 삭제
  # 3. ai-server mem_limit를 2000m으로 복원
  # 4. .env에서 STORAGE_MODE=proxy로 변경
  neo4j:
    image: neo4j:5-community
    container_name: mindlog-neo4j
    ports:
      - "7474:7474"   # HTTP Browser UI
      - "7687:7687"   # Bolt (앱 연결)
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache__size: "256m"
    volumes:
      - ./data/neo4j:/data
      - ./logs/neo4j:/logs
    mem_limit: 1g
    memswap_limit: 1g
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"