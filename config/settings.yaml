# Mind-Log 설정 파일
# 에이전트별 모델, 타임아웃, 기능 플래그를 정의한다.
# 환경변수(.env)로 개별 값을 오버라이드할 수 있다.

app:
  name: mind-log
  version: "0.1.0"

# LLM 모델 설정
# API 모델은 변경될 수 있으므로 하드코딩하지 않고 여기서 관리한다.
# provider: anthropic(직접 API) 또는 bedrock(AWS Bedrock) 선택
# 환경변수 LLM_PROVIDER로 오버라이드 가능
llm:
  provider: anthropic  # anthropic | bedrock | openai
  models:
    haiku: "claude-haiku-4-5-20251001"
    sonnet: "claude-sonnet-4-5-20250929"
    opus: "claude-opus-4-6"
  # Bedrock 전용 모델 ID (provider: bedrock일 때 사용)
  bedrock_models:
    haiku: "anthropic.claude-haiku-4-5-20251001-v1:0"
    sonnet: "anthropic.claude-sonnet-4-5-20250929-v2:0"
    opus: "anthropic.claude-opus-4-6-v1:0"
  # OpenAI 전용 모델 ID (provider: openai일 때 사용)
  openai_models:
    haiku: "gpt-4o-mini"                          # 경량 작업
    sonnet: "gpt-4o-mini"                         # 표준 작업 (비용 효율적)
    opus: "gpt-4o"                                # 복잡한 추론
  # Bedrock 설정
  bedrock:
    region: "ap-northeast-2"  # 환경변수 AWS_REGION으로 오버라이드 가능
    # endpoint_url: ""        # 커스텀 엔드포인트 (선택)
  default_max_tokens: 4096
  temperature:
    default: 0.7
    safety: 0.1       # 안전 분석은 낮은 temperature
    reasoning: 0.3    # 추론은 약간 낮은 temperature

# 에이전트별 설정
agents:
  # TIER 0
  intent_classifier:
    model: haiku
    max_tokens: 1024
    temperature: 0.3

  # ──────────────────────────────────────
  # 공용 TIER 1 (대화모드 + 팟캐스트모드)
  # ──────────────────────────────────────
  safety:
    model: sonnet
    max_tokens: 2048
    temperature: 0.1
    crisis_threshold: 3  # risk_level >= 3 이면 CRISIS
  emotion:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 1 (병렬)
  # ──────────────────────────────────────
  context:
    model: haiku          # CLAUDE.md 기준: Haiku
    max_tokens: 2048
  reasoning:
    model: opus           # 사용자 결정: Opus 4.6 (복잡한 추론)
    max_tokens: 4096
    temperature: 0.3

  # ──────────────────────────────────────
  # 대화모드 TIER 1 독립 에이전트
  # ──────────────────────────────────────
  memory:
    model: sonnet
    max_tokens: 2048
  knowledge:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 2
  # ──────────────────────────────────────
  synthesis:
    model: sonnet
    max_tokens: 4096

  # ──────────────────────────────────────
  # 대화모드 TIER 3
  # ──────────────────────────────────────
  validator:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 4
  # ──────────────────────────────────────
  personalization:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 비동기
  # ──────────────────────────────────────
  visualization:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 1 (병렬)
  # ──────────────────────────────────────
  content_analyzer:
    model: sonnet
    max_tokens: 2048
    min_duration: 3
    max_duration: 5
    min_sub_themes: 3
    max_sub_themes: 5
    min_input_length: 10
    max_theme_length: 100
    deep_threshold: 0.7      # complexity_score ≥ 이 값 → depth_level "deep"
    moderate_threshold: 0.4  # complexity_score ≥ 이 값 → depth_level "medium" (미만 → "shallow")
  podcast_reasoning:
    model: sonnet
    max_tokens: 4096
    temperature: 0.3
    full_threshold: 0.0      # complexity ≥ 이 값 → full GoT/ToT/CoT 추론 (0.0=항상 full)
    standard_threshold: 0.0  # complexity ≥ 이 값 → standard 추론 (미만 → lightweight)

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 1 독립 에이전트
  # ──────────────────────────────────────
  episode_memory:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 2
  # ──────────────────────────────────────
  script_generator:
    model: sonnet
    max_tokens: 4096
  visualization_podcast:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 3
  # ──────────────────────────────────────
  batch_validator:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 4
  # ──────────────────────────────────────
  script_personalizer:
    model: sonnet
    max_tokens: 4096

  # ──────────────────────────────────────
  # 공용 비동기
  # ──────────────────────────────────────
  telemetry:
    model: haiku
    max_tokens: 1024
  learning:
    model: haiku
    max_tokens: 1024

# 저장소 설정
storage:
  mode: "local"                    # local | proxy | hybrid
  s3:
    bucket: "mindlog-images"
    # region은 별도 정의 안 함 — 기존 llm.bedrock.region / AWS_REGION 재사용
    upload_prefix: "vis"           # TODO(backend): 4-4 prefix 확정
  pinecone:
    index_knowledge: "expert_knowledge"
    index_memory_conversation: "mem_conversation"
    index_memory_podcast: "mem_podcast_episode"

# 파이프라인 설정
pipeline:
  max_retries: 2              # TIER 3 → TIER 2 재시도 상한 (FAIL용)
  max_critical_retries: 4     # CRITICAL_FAIL 전용 재시도 상한
  tier0_timeout_seconds: 10    # TIER 0: Intent Classifier 단독
  tier1_timeout_seconds: 30    # TIER 1: 병렬 4개 중 Podcast Reasoning 기준 (실측 최대 15.4s × 1.5)
  tier2_timeout_seconds: 140   # TIER 2: Script Generator + Visualization 병렬 (실측 최대 90.3s × 1.5)
  tier3_timeout_seconds: 50    # TIER 3: Batch Validator 재시도 포함 (실측 최대 30.3s × 1.5)
  tier4_timeout_seconds: 10    # TIER 4: Script Personalizer (rule-based, LLM 활성 시 대비)
  async_timeout_seconds: 30    # 비동기: Visualization + Learning

# 백엔드 API 설정
api:
  timeout: 5                  # 기본 타임아웃 (초)
  llm_timeout: 30             # LLM 관련 타임아웃 (초)
  max_retries: 3              # 최대 재시도 횟수

# 프롬프트 관리 설정
# 환경변수 PROMPT_DIR로 오버라이드 가능 (환경 분리용)
prompts:
  base_dir: "prompts"  # 기본 프롬프트 디렉토리 (프로젝트 루트 기준)

  # 에이전트별 프롬프트 버전 핀닝 (v8 멀티버전)
  # 미지정 에이전트는 YAML 내부 default_version 사용
  versions:
    default: "1.0.0"              # 글로벌 기본 버전
    content_analyzer: "2.1.0"     # Round 4 최적 조합 A (2026-03-06, OpenAI)
    podcast_reasoning: "3.0.0"    # Round 4 최적 — ToT Branch Scoring (2026-03-06)
    batch_validator: "2.3.0"      # Round 4 최적 — 감점 규칙 (2026-03-06, avg 0.863±0.006)
    # learning: "1.0.0"

  # A/B 테스트 설정 (선택적)
  # enabled: true로 활성화, false 또는 미설정이면 비활성
  # assignment: "session" = 세션 단위 결정적 할당, "request" = 요청 단위 랜덤
  # ab_tests:
  #   content_analyzer:
  #     enabled: false
  #     variant_a: "1.0.0"
  #     variant_b: "1.1.0"
  #     traffic_split: 0.5
  #     assignment: "session"

# 기능 플래그
features:
  podcast_mode: true
  visualization: true
  telemetry: true
  learning: true

# 모니터링 & Observability
monitoring:
  enabled: true
  provider: "langsmith"              # langsmith | langfuse | both
  langsmith:
    project: "mind-log"
    tracing_enabled: true
  langfuse:
    enabled: false
    self_hosted: false
    host: "https://cloud.langfuse.com"
  metrics:
    collect_token_usage: true
    collect_tier_timing: true
    collect_agent_io: true           # I/O 스냅샷 저장 여부
    io_snapshot_max_chars: 2000      # 스냅샷 최대 문자수 (민감정보 보호)
  alerting:
    crisis_alert_enabled: true
    latency_threshold_ms: 10000      # 파이프라인 전체 10초 초과 시 경고
