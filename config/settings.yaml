# Mind-Log 설정 파일
# 에이전트별 모델, 타임아웃, 기능 플래그를 정의한다.
# 환경변수(.env)로 개별 값을 오버라이드할 수 있다.

app:
  name: mind-log
  version: "0.1.0"

# LLM 모델 설정
# API 모델은 변경될 수 있으므로 하드코딩하지 않고 여기서 관리한다.
# provider: anthropic(직접 API) 또는 bedrock(AWS Bedrock) 선택
llm:
  provider: bedrock  # [수정] 오늘 성공한 bedrock을 기본값으로 설정
  models:
    haiku: "claude-haiku-4-5-20251001"
    sonnet: "claude-sonnet-4-5-20250929"
    opus: "claude-opus-4-6"
  
  # Bedrock 전용 모델 ID (provider: bedrock일 때 사용)
  # [수정] ap-northeast-2(서울)은 Claude 3.5 Sonnet v2 이상 In-Region 직접 호출 불가
  # APAC Cross-Region Inference Profile(CRIS) ID 사용 필수
  # Bedrock 최적화 Phase 3 완료 후 에이전트별 최적 모델로 재교체 예정
  bedrock_models:
    haiku:  "anthropic.claude-3-haiku-20240307-v1:0"          # In-Region 지원 (유지)
    sonnet: "apac.anthropic.claude-3-5-sonnet-20241022-v2:0"  # APAC CRIS 필수
    opus:   "apac.anthropic.claude-sonnet-4-20250514-v1:0"    # Opus 서울 미지원 → Sonnet 4 대체
    # 추가 모델 (Bedrock 최적화 Phase 3 결과 후 활성화)
    # claude_sonnet_4: "apac.anthropic.claude-sonnet-4-20250514-v1:0"
    # nova_pro:  "apac.amazon.nova-pro-v1:0"
    # nova_lite: "apac.amazon.nova-lite-v1:0"
  
  # OpenAI 전용 모델 ID (provider: openai일 때 사용)
  openai_models:
    haiku: "gpt-4o-mini"
    sonnet: "gpt-4o-mini"
    opus: "gpt-4o"
  
  # Bedrock 설정
  bedrock:
    region: "ap-northeast-2"  # 서울 리전 고정
    retry:
      max_attempts: 3           # ThrottlingException/ServiceUnavailableException 재시도 상한
      initial_backoff_seconds: 1
      max_backoff_seconds: 8
    concurrency_limit: 10       # 동시 Bedrock 호출 상한 (Semaphore)

  # Circuit Breaker — LLM 프로바이더 장애 시 cascading failure 방지
  circuit_breaker:
    fail_max: 5          # 연속 실패 횟수 → OPEN 전환
    reset_timeout: 30    # OPEN → HALF_OPEN 전환 대기(초)

  # 프롬프트 캐싱 설정 (Bedrock cachePoint / Anthropic cache_control)
  # 캐시 읽기 = 표준 입력 토큰의 10% → 반복 요청 시 최대 ~88% 절감
  # 서울 리전 지원 여부: Phase 0 캐싱 검증(cacheWriteInputTokens > 0)으로 확인
  prompt_caching:
    enabled: true
    min_tokens: 1024  # 이 미만 프롬프트는 자동 스킵 (에러 없음)
  
  default_max_tokens: 4096
  temperature:
    default: 0.7
    safety: 0.1       # 안전 분석은 낮은 temperature
    reasoning: 0.3    # 추론은 약간 낮은 temperature

# 에이전트별 설정
agents:
  # TIER 0
  intent_classifier:
    model: haiku
    max_tokens: 1024
    temperature: 0.3

  # ──────────────────────────────────────
  # 공용 TIER 1 (대화모드 + 팟캐스트모드)
  # ──────────────────────────────────────
  safety:
    model: sonnet
    max_tokens: 2048
    temperature: 0.1
    crisis_threshold: 3  # risk_level >= 3 이면 CRISIS
  emotion:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 1 (병렬)
  # ──────────────────────────────────────
  context:
    model: haiku
    max_tokens: 2048
  reasoning:
    model: opus
    max_tokens: 4096
    temperature: 0.3

  # ──────────────────────────────────────
  # 대화모드 TIER 1 독립 에이전트
  # ──────────────────────────────────────
  memory:
    model: sonnet
    max_tokens: 2048
  knowledge:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 2
  # ──────────────────────────────────────
  synthesis:
    model: sonnet
    max_tokens: 4096

  # ──────────────────────────────────────
  # 대화모드 TIER 3
  # ──────────────────────────────────────
  validator:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 4
  # ──────────────────────────────────────
  personalization:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 비동기
  # ──────────────────────────────────────
  visualization:
    model: sonnet
    max_tokens: 2048
    image_model: "amazon.titan-image-generator-v2:0"  # text-to-image (생성 단계)
    image_region: "us-east-1"                         # 이미지 모델 전용 리전 (서울에 없음)

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 1 (병렬)
  # ──────────────────────────────────────
  content_analyzer:
    model: sonnet
    max_tokens: 2048
    min_duration: 3
    max_duration: 5
    min_sub_themes: 3
    max_sub_themes: 5
    min_input_length: 10
    max_theme_length: 100
    deep_threshold: 0.7      # complexity_score ≥ 이 값 → depth_level "deep"
    moderate_threshold: 0.4  # complexity_score ≥ 이 값 → depth_level "medium" (미만 → "shallow")
  podcast_reasoning:
    model: sonnet
    max_tokens: 8192  # [수정] 실제 출력 7~11KB → 4096 초과 시 JSON 잘림 방지
    temperature: 0.3
    full_threshold: 0.0      # complexity ≥ 이 값 → full GoT/ToT/CoT 추론 (0.0=항상 full)
    standard_threshold: 0.0  # complexity ≥ 이 값 → standard 추론 (미만 → lightweight)

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 1 독립 에이전트
  # ──────────────────────────────────────
  episode_memory:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 2
  # ──────────────────────────────────────
  script_generator:
    model: sonnet
    max_tokens: 8192  # [수정] 실제 출력 8~21KB → 4096 초과 시 JSON 잘림 방지
  visualization_podcast:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 3
  # ──────────────────────────────────────
  batch_validator:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 4
  # ──────────────────────────────────────
  script_personalizer:
    model: sonnet
    max_tokens: 4096
    deep_personalization: false  # [설정화] script_personalizer.py 하드코딩 대체

  # ──────────────────────────────────────
  # 공용 비동기
  # ──────────────────────────────────────
  telemetry:
    model: haiku
    max_tokens: 1024
  learning:
    model: haiku
    max_tokens: 1024

# 저장소 설정
storage:
  mode: "proxy"                    # local | proxy | hybrid  [수정] 프로덕션 환경: proxy (백엔드 API 저장)
  s3:
    bucket: "mindlog-images"
    # region은 별도 정의 안 함 — 기존 llm.bedrock.region / AWS_REGION 재사용
    upload_prefix: "vis"           # TODO(backend): 4-4 prefix 확정
  pinecone:
    index_knowledge: "expert_knowledge"
    index_memory_conversation: "mem_conversation"
    index_memory_podcast: "mem_podcast_episode"

# 파이프라인 설정
pipeline:
  max_retries: 2              # TIER 3 → TIER 2 재시도 상한 (FAIL용)
  max_critical_retries: 4     # CRITICAL_FAIL 전용 재시도 상한
  tier0_timeout_seconds: 10    # TIER 0: Intent Classifier 단독
  tier1_timeout_seconds: 30    # TIER 1: 병렬 4개 중 Podcast Reasoning 기준 (실측 최대 15.4s × 1.5)
  tier2_timeout_seconds: 140   # TIER 2: Script Generator + Visualization 병렬 (실측 최대 90.3s × 1.5)
  tier3_timeout_seconds: 50    # TIER 3: Batch Validator 재시도 포함 (실측 최대 30.3s × 1.5)
  tier4_timeout_seconds: 10    # TIER 4: Script Personalizer (rule-based, LLM 활성 시 대비)
  async_timeout_seconds: 30    # 비동기: Visualization + Learning

# 백엔드 API 설정
api:
  timeout: 5                  # 기본 타임아웃 (초)
  llm_timeout: 30             # LLM 관련 타임아웃 (초)
  max_retries: 3              # 최대 재시도 횟수

# 프롬프트 관리 설정
prompts:
  base_dir: "prompts"

  # 에이전트별 프롬프트 버전 핀닝 (Round 4 최적, 2026-03-06 확정)
  # 미지정 에이전트는 YAML 내부 default_version 사용
  versions:
    default: "1.0.0"
    content_analyzer: "2.1.0"     # Round 4 최적 조합 A (OpenAI)
    podcast_reasoning: "3.0.0"    # Round 4 최적 — ToT Branch Scoring
    batch_validator: "2.3.0"      # Round 4 최적 — 감점 규칙 (avg 0.863±0.006)


# [미사용] Feature flags — 향후 에이전트별 활성화/비활성화 제어 시 사용 예정
# 현재 코드에서 읽지 않음. 활성화 시 config/loader.py에 property 추가 필요.
features:
  podcast_mode: true
  visualization: true
  telemetry: true
  learning: true

# 모니터링 & Observability
monitoring:
  enabled: true
  provider: "langsmith"
  langsmith:
    project: "mind-log"
    tracing_enabled: true
  langfuse:
    enabled: false
    self_hosted: false
    host: "https://cloud.langfuse.com"
  metrics:
    collect_token_usage: true
    collect_tier_timing: true
    collect_agent_io: true
    io_snapshot_max_chars: 2000
  alerting:
    crisis_alert_enabled: true
    latency_threshold_ms: 10000

# 데이터베이스 설정
databases:
  neo4j:
    uri: "bolt://localhost:7687"  # 환경변수 NEO4J_URI로 오버라이드
    # NEO4J_USER / NEO4J_PASSWORD 환경변수 필수
  pinecone:
    index_knowledge: "expert_knowledge"
    index_memory_conversation: "mem_conversation"
    index_memory_podcast: "mem_podcast_episode"
    # PINECONE_API_KEY 환경변수 필수