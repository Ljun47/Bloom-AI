# Mind-Log 설정 파일
# 에이전트별 모델, 타임아웃, 기능 플래그를 정의한다.
# 환경변수(.env)로 개별 값을 오버라이드할 수 있다.

app:
  name: mind-log
  version: "0.1.0"

# LLM 모델 설정
# API 모델은 변경될 수 있으므로 하드코딩하지 않고 여기서 관리한다.
# provider: anthropic(직접 API) 또는 bedrock(AWS Bedrock) 선택
llm:
  provider: bedrock  # [수정] 오늘 성공한 bedrock을 기본값으로 설정
  models:
    haiku: "claude-haiku-4-5-20251001"
    sonnet: "claude-sonnet-4-5-20250929"
    sonnet_37: "claude-3-7-sonnet-20250219"  # Bedrock 최적 모델 키 — Anthropic 직접 API 폴백용
    opus: "claude-opus-4-6"
  
  # Bedrock 전용 모델 ID (provider: bedrock일 때 사용)
  # [수정] ap-northeast-2(서울)은 Claude 3.5 Sonnet v2 이상 In-Region 직접 호출 불가
  # APAC Cross-Region Inference Profile(CRIS) ID 사용 필수
  # Bedrock 최적화 Phase 3 완료 — 에이전트별 최적 모델 반영 (2026-04-01)
  bedrock_models:
    haiku:     "anthropic.claude-3-haiku-20240307-v1:0"            # In-Region 지원
    sonnet:    "apac.anthropic.claude-3-5-sonnet-20241022-v2:0"    # APAC CRIS
    sonnet_37: "apac.anthropic.claude-3-7-sonnet-20250219-v1:0"    # Phase 3 최적 모델 (intent/safety/personalizer)
    opus:      "apac.anthropic.claude-sonnet-4-20250514-v1:0"      # Opus 서울 미지원 → Sonnet 4 대체
  
  # OpenAI 전용 모델 ID (provider: openai일 때 사용)
  openai_models:
    haiku: "gpt-4o-mini"
    sonnet: "gpt-4o-mini"
    opus: "gpt-4o"
  
  # Bedrock 설정
  bedrock:
    region: "ap-northeast-2"  # 서울 리전 고정
    retry:
      max_attempts: 3           # ThrottlingException/ServiceUnavailableException 재시도 상한
      initial_backoff_seconds: 1
      max_backoff_seconds: 8
    concurrency_limit: 100      # 동시 Bedrock 호출 상한 (Semaphore)

  # Circuit Breaker — LLM 프로바이더 장애 시 cascading failure 방지
  circuit_breaker:
    fail_max: 5          # 연속 실패 횟수 → OPEN 전환
    reset_timeout: 30    # OPEN → HALF_OPEN 전환 대기(초)

  # 프롬프트 캐싱 설정 (Bedrock cachePoint / Anthropic cache_control)
  # 캐시 읽기 = 표준 입력 토큰의 10% → 반복 요청 시 최대 ~88% 절감
  # 서울 리전 지원 여부: Phase 0 캐싱 검증(cacheWriteInputTokens > 0)으로 확인
  prompt_caching:
    enabled: true
    min_tokens: 1024  # 이 미만 프롬프트는 자동 스킵 (에러 없음)
  
  default_max_tokens: 4096
  temperature:
    default: 0.7
    safety: 0.1       # 안전 분석은 낮은 temperature
    reasoning: 0.3    # 추론은 약간 낮은 temperature

# 에이전트별 설정
agents:
  # TIER 0
  intent_classifier:
    model: haiku  # 2026-04-14: sonnet_37 APAC 지연 급증(4.4x)으로 haiku 전환
    max_tokens: 1024
    temperature: 0.3

  # ──────────────────────────────────────
  # TIER 1 (병렬)
  # ──────────────────────────────────────
  safety:
    model: sonnet  # 2026-04-14: sonnet_37 APAC 지연 급증(16.3x)으로 sonnet 전환
    max_tokens: 2048
    temperature: 0.1
    crisis_threshold: 3  # risk_level >= 3 이면 CRISIS
  emotion:
    model: haiku  # Phase 3 최적: c3-haiku (composite 0.725)
    max_tokens: 2048

  # ──────────────────────────────────────
  # 독립 에이전트 (Podcast Reasoning 조건부 호출)
  # ──────────────────────────────────────
  knowledge:
    model: sonnet
    max_tokens: 2048
    pinecone_score_threshold: 0.7  # Pinecone 유사도 필터 임계값 (이전: 코드 하드코딩 0.7)
    pinecone_top_k: 5              # Pinecone top_k (이전: 코드 하드코딩 5)

  # ──────────────────────────────────────
  # 비동기
  # ──────────────────────────────────────
  visualization:
    model: haiku  # Phase 3 최적: c3-haiku (composite 0.594)
    max_tokens: 2048
    image_model: "amazon.titan-image-generator-v2:0"  # text-to-image (생성 단계)
    image_region: "us-east-1"                         # 이미지 모델 전용 리전 (서울에 없음)

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 1 (병렬)
  # ──────────────────────────────────────
  content_analyzer:
    model: haiku  # Phase 3 최적: c3-haiku (composite 0.905)
    max_tokens: 2048
    min_duration: 3
    max_duration: 5
    min_sub_themes: 3
    max_sub_themes: 5
    min_input_length: 10
    max_theme_length: 100
    deep_threshold: 0.7      # complexity_score ≥ 이 값 → depth_level "deep"
    moderate_threshold: 0.4  # complexity_score ≥ 이 값 → depth_level "medium" (미만 → "shallow")
  podcast_reasoning:
    model: sonnet  # 2026-04-14: sonnet_37 APAC 지연 급증(3.2x)으로 sonnet 전환
    max_tokens: 6000  # 4096 → 6000: group 필드 추가로 출력 증가 대비 (40%+ 마진)
    temperature: 0.3
    full_threshold: 0.0      # complexity ≥ 이 값 → full GoT/ToT/CoT 추론 (0.0=항상 full)
    standard_threshold: 0.0  # complexity ≥ 이 값 → standard 추론 (미만 → lightweight)
    memory_style_score_threshold: 0.9  # CoT 스타일 참고용 에피소드 최소 유사도 (0.0~1.0)

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 1 독립 에이전트
  # ──────────────────────────────────────
  episode_memory:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 2
  # ──────────────────────────────────────
  script_generator:
    model: haiku  # Phase 3 최적: c3-haiku (composite 0.659)
    max_tokens: 4096  # c3-haiku 모델 최대 출력 한계 (8192는 sonnet 이상에서만 유효)
  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 3
  # ──────────────────────────────────────
  batch_validator:
    model: haiku  # Phase 3 최적: c3-haiku (composite 0.704)
    max_tokens: 2048
    max_retries: 1             # pipeline.max_retries와 동기화 (SSOT: pipeline.max_retries)

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 4
  # ──────────────────────────────────────
  script_personalizer:
    model: sonnet  # 2026-04-14: sonnet_37 APAC 지연 급증으로 sonnet 전환
    max_tokens: 4096
    deep_personalization: false  # [설정화] script_personalizer.py 하드코딩 대체

  # ──────────────────────────────────────
  # 공용 비동기
  # ──────────────────────────────────────
  learning:
    model: sonnet  # Phase 3 최적: c35-sonnet-v2 (composite 0.619)
    max_tokens: 1024

# 저장소 설정
storage:
  mode: "proxy"                    # local | proxy | hybrid  [수정] 프로덕션 환경: proxy (백엔드 API 저장)
  s3:
    bucket: "mindlog-images"
    # region은 별도 정의 안 함 — 기존 llm.bedrock.region / AWS_REGION 재사용
    upload_prefix: "vis"           # TODO(backend): 4-4 prefix 확정
  pinecone:
    index_knowledge: "expert-knowledge"
    # Episode Memory 인덱스: 환경변수 PINECONE_INDEX_EPISODE로 관리 (GitHub Secrets)

# 누적 그래프 설정
graph:
  ema_alpha: 0.3    # EMA 지수이동평균 계수 (0.0~1.0, 클수록 최신 에피소드 반영 비율 높음)

# 파이프라인 설정
pipeline:
  max_retries: 1              # TIER 3 → TIER 2 재시도 상한 (FAIL용) — 최악 760s 상한
  max_critical_retries: 2     # CRITICAL_FAIL 전용 재시도 상한 — 최악 1140s 상한
  tier0_timeout_seconds: 40    # TIER 0: Intent Classifier 단독 (20 → 40, APAC CRIS 지연 반영)
  tier1_timeout_seconds: 240   # TIER 1: 병렬 4개 — Podcast Reasoning 120초+ 빈도 반영 (120 → 240)
  tier2_timeout_seconds: 280   # TIER 2: Script Generator + Visualization 병렬 (기존 140 × 2)
  tier3_timeout_seconds: 100   # TIER 3: Batch Validator 재시도 포함 (기존 50 × 2)
  tier4_timeout_seconds: 40    # TIER 4: Script Personalizer (20 → 40, APAC CRIS 지연 반영)
  async_timeout_seconds: 120   # 비동기: Visualization + Learning (60 → 120)

# Stories 수신 대기 설정
stories:
  wait_timeout_seconds: 300  # 최대 5분 대기

# 백엔드 API 설정
api:
  timeout: 10                 # 기본 타임아웃 (초, 기존 5 × 2)
  llm_timeout: 60             # LLM 관련 타임아웃 (초, 기존 30 × 2)
  max_retries: 3              # 최대 재시도 횟수

# 프롬프트 관리 설정
prompts:
  base_dir: "prompts"

  # 에이전트별 프롬프트 버전 핀닝 (Round 4 최적, 2026-03-06 확정)
  # 미지정 에이전트는 YAML 내부 default_version 사용
  versions:
    default: "1.0.0"
    content_analyzer: "2.2.0"     # 4-키 emotional_journey (opening/development/climax/closing)
    podcast_reasoning: "3.2.0"    # v3.1.0 + Episode Memory 컨텍스트 주입 (tot/cot 참고 지침)
    batch_validator: "2.3.0"      # Round 4 최적 — 감점 규칙 (avg 0.863±0.006)
    visualization: "1.19.0"      # JSON-only 응답 강제 지시 추가 (파싱 실패 대응)


# [보안] PII(개인식별정보) 정제 설정
# [보안 담당자 참고] 프로덕션에서는 반드시 true 유지
# 정제 패턴은 src/agents/shared/output_sanitizer.py에서 관리
security:
  pii_sanitization:
    enabled: true

# 모니터링 & Observability
monitoring:
  enabled: true
  provider: "langsmith"
  langsmith:
    project: "mind-log"
    tracing_enabled: true
  langfuse:
    enabled: false
    self_hosted: false
    host: "https://cloud.langfuse.com"
  metrics:
    collect_token_usage: true
    collect_tier_timing: true
    collect_agent_io: true
    io_snapshot_max_chars: 2000
  alerting:
    crisis_alert_enabled: true
    latency_threshold_ms: 10000
