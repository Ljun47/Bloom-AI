# Mind-Log 설정 파일
# 에이전트별 모델, 타임아웃, 기능 플래그를 정의한다.
# 환경변수(.env)로 개별 값을 오버라이드할 수 있다.

app:
  name: mind-log
  version: "0.1.0"

# LLM 모델 설정
# API 모델은 변경될 수 있으므로 하드코딩하지 않고 여기서 관리한다.
# provider: anthropic(직접 API) 또는 bedrock(AWS Bedrock) 선택
llm:
  provider: bedrock  # [수정] 오늘 성공한 bedrock을 기본값으로 설정
  models:
    haiku: "claude-haiku-4-5-20251001"
    sonnet: "claude-sonnet-4-5-20250929"
    opus: "claude-opus-4-6"
  
  # Bedrock 전용 모델 ID (provider: bedrock일 때 사용)
  # [수정] 2026년 환경에서 검증된 최신 Bedrock ID로 업데이트
  bedrock_models:
    haiku: "anthropic.claude-3-haiku-20240307-v1:0"
    sonnet: "anthropic.claude-3-5-sonnet-20241022-v2:0"
    opus:   "anthropic.claude-3-opus-20240229-v1:0"
  
  # OpenAI 전용 모델 ID (provider: openai일 때 사용)
  openai_models:
    haiku: "gpt-4o-mini"
    sonnet: "gpt-4o-mini"
    opus: "gpt-4o"
  
  # Bedrock 설정
  bedrock:
    region: "ap-northeast-2"  # 서울 리전 고정
  
  default_max_tokens: 4096
  temperature:
    default: 0.7
    safety: 0.1       # 안전 분석은 낮은 temperature
    reasoning: 0.3    # 추론은 약간 낮은 temperature

# 에이전트별 설정
agents:
  # TIER 0
  intent_classifier:
    model: haiku
    max_tokens: 1024
    temperature: 0.3

  # ──────────────────────────────────────
  # 공용 TIER 1 (대화모드 + 팟캐스트모드)
  # ──────────────────────────────────────
  safety:
    model: sonnet
    max_tokens: 2048
    temperature: 0.1
    crisis_threshold: 3  # risk_level >= 3 이면 CRISIS
  emotion:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 1 (병렬)
  # ──────────────────────────────────────
  context:
    model: haiku
    max_tokens: 2048
  reasoning:
    model: opus
    max_tokens: 4096
    temperature: 0.3

  # ──────────────────────────────────────
  # 대화모드 TIER 1 독립 에이전트
  # ──────────────────────────────────────
  memory:
    model: sonnet
    max_tokens: 2048
  knowledge:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 2
  # ──────────────────────────────────────
  synthesis:
    model: sonnet
    max_tokens: 4096

  # ──────────────────────────────────────
  # 대화모드 TIER 3
  # ──────────────────────────────────────
  validator:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 TIER 4
  # ──────────────────────────────────────
  personalization:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 대화모드 비동기
  # ──────────────────────────────────────
  visualization:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 1 (병렬)
  # ──────────────────────────────────────
  content_analyzer:
    model: sonnet
    max_tokens: 2048
    min_duration: 3
    max_duration: 5
    min_sub_themes: 3
    max_sub_themes: 5
    min_input_length: 10
    max_theme_length: 100
    deep_threshold: 0.7
    moderate_threshold: 0.4
  podcast_reasoning:
    model: sonnet
    max_tokens: 4096
    temperature: 0.3
    full_threshold: 0.0
    standard_threshold: 0.0

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 1 독립 에이전트
  # ──────────────────────────────────────
  episode_memory:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 2
  # ──────────────────────────────────────
  script_generator:
    model: sonnet
    max_tokens: 4096
  visualization_podcast:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 3
  # ──────────────────────────────────────
  batch_validator:
    model: sonnet
    max_tokens: 2048

  # ──────────────────────────────────────
  # 팟캐스트모드 TIER 4
  # ──────────────────────────────────────
  script_personalizer:
    model: sonnet
    max_tokens: 4096

  # ──────────────────────────────────────
  # 공용 비동기
  # ──────────────────────────────────────
  telemetry:
    model: haiku
    max_tokens: 1024
  learning:
    model: haiku
    max_tokens: 1024

# 파이프라인 설정
pipeline:
  max_retries: 2              # TIER 3 → TIER 2 재시도 상한
  tier1_timeout_seconds: 15   # TIER 1 병렬 작업 타임아웃
  tier2_timeout_seconds: 20   # TIER 2 생성 작업 타임아웃
  async_timeout_seconds: 30   # 비동기 작업 타임아웃

# 백엔드 API 설정
api:
  timeout: 5                  # 기본 타임아웃 (초)
  llm_timeout: 30             # LLM 관련 타임아웃 (초)
  max_retries: 3              # 최대 재시도 횟수

# 프롬프트 관리 설정
prompts:
  base_dir: "prompts"

  # 에이전트별 프롬프트 버전 핀닝
  versions:
    default: "1.0.0"

# 기능 플래그
features:
  podcast_mode: true
  visualization: true
  telemetry: true
  learning: true

# 모니터링 & Observability
monitoring:
  enabled: true
  provider: "langsmith"
  langsmith:
    project: "mind-log"
    tracing_enabled: true
  langfuse:
    enabled: false
    self_hosted: false
    host: "https://cloud.langfuse.com"
  metrics:
    collect_token_usage: true
    collect_tier_timing: true
    collect_agent_io: true
    io_snapshot_max_chars: 2000
  alerting:
    crisis_alert_enabled: true
    latency_threshold_ms: 10000