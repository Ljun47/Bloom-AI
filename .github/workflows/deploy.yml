name: AI Server Auto Deploy (SSM)
on:
  push:
    branches:
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS Identity  # 인증 확인용 (디버깅 후 제거 가능)
        run: aws sts get-caller-identity

      - name: Deploy via AWS SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AWS_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ubuntu/app",
              "git pull origin develop",
              "cat > .env << '\''EOF'\''",
              "LANGCHAIN_TRACING_V2=${{ secrets.LANGCHAIN_TRACING_V2 }}",
              "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}",
              "LANGCHAIN_PROJECT=${{ secrets.LANGCHAIN_PROJECT }}",
              "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}",
              "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}",
              "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}",
              "APP_ENV=${{ secrets.APP_ENV }}",
              "LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}",
              "AWS_REGION=${{ secrets.AWS_REGION }}",
              "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}",
              "LOG_FORMAT=${{ secrets.LOG_FORMAT }}",
              "LOG_LEVEL=${{ secrets.LOG_LEVEL }}",
              "PROMPT_DIR=${{ secrets.PROMPT_DIR }}",
              "EOF",
              "sudo docker compose down",
              "sudo docker compose up -d --build"
            ]' \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)

          # 명령 완료 대기
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.AWS_INSTANCE_ID }}"

          # 결과 출력
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.AWS_INSTANCE_ID }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]"
