name: AI Server Auto Deploy (SSM)

on:
  push:
    branches:
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  # Converts repository to lowercase for GHCR compatibility
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_NAME_LOWER: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for AI Server
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-ai-server
          tags: |
            type=sha,format=long
            type=ref,event=branch
            latest

      - name: Build and push AI Server Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set lower case repository name
        run: echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Deploy via AWS SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AWS_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters 'commands=[
              "mkdir -p /home/ubuntu/app",
              "sudo chown -R ubuntu:ubuntu /home/ubuntu/app",
              "cd /home/ubuntu/app",
              "if [ ! -d .git ]; then git clone -b develop ${{ github.server_url }}/${{ github.repository }}.git . ; fi",
              "git config --system --add safe.directory /home/ubuntu/app",
              "git fetch origin develop",
              "git reset --hard origin/develop",
              "echo '"'"'LANGCHAIN_TRACING_V2=${{ secrets.LANGCHAIN_TRACING_V2 }}'"'"' > .env",
              "echo '"'"'LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}'"'"' >> .env",
              "echo '"'"'LANGCHAIN_PROJECT=${{ secrets.LANGCHAIN_PROJECT }}'"'"' >> .env",
              "echo '"'"'AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}'"'"' >> .env",
              "echo '"'"'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}'"'"' >> .env",
              "echo '"'"'AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}'"'"' >> .env",
              "echo '"'"'APP_ENV=${{ secrets.APP_ENV }}'"'"' >> .env",
              "echo '"'"'LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}'"'"' >> .env",
              "echo '"'"'AWS_REGION=${{ secrets.AWS_REGION }}'"'"' >> .env",
              "echo '"'"'ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}'"'"' >> .env",
              "echo '"'"'LOG_FORMAT=${{ secrets.LOG_FORMAT }}'"'"' >> .env",
              "echo '"'"'LOG_LEVEL=${{ secrets.LOG_LEVEL }}'"'"' >> .env",
              "echo '"'"'PROMPT_DIR=${{ secrets.PROMPT_DIR }}'"'"' >> .env",
              "echo '"'"'AI_SERVER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-ai-server:latest'"'"' >> .env",
              "echo ${{ secrets.GHCR_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "sudo docker-compose pull",
              "sudo docker-compose up -d",
              "sudo docker image prune -a -f --filter \"until=24h\""
            ]' \
            --region ${{ secrets.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $CMD_ID"

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.AWS_INSTANCE_ID }}"
