services:
  mysql:
    image: mysql:8.0
    container_name: mindlog-dev-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: DB_ROOT_REMOVED
      MYSQL_DATABASE: mindlog
      MYSQL_USER: mindlog_user
      MYSQL_PASSWORD: DB_PASS_REMOVED
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mindlog_dev_mysql:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pDB_ROOT_REMOVED"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: mindlog-dev-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/DB_NEO4J_REMOVED
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - mindlog_dev_neo4j:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "DB_NEO4J_REMOVED", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mindlog_dev_mysql:
  mindlog_dev_neo4j:
